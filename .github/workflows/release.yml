name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
        timeout-minutes: 10

      # Ensure build/ directory with icons exists
      # On macOS/Linux, we might need to regenerate icons if they are not in git
      # But user said they will upload everything. Assuming build/icon.* are committed.
      
      - name: Build App
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 30

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/artifacts-macos-latest/*.dmg
            artifacts/artifacts-macos-latest/*.zip
            artifacts/artifacts-windows-latest/*.exe
            artifacts/artifacts-ubuntu-latest/*.AppImage
            artifacts/artifacts-ubuntu-latest/*.snap
            artifacts/artifacts-ubuntu-latest/*.deb
            artifacts/artifacts-ubuntu-latest/*.rpm
          draft: false
          prerelease: false
          generate_release_notes: true
